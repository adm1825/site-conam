<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - Depósito Dupla Face (Lados Independentes)</title>
    <style>
        /* Estilos Globais */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        header { background-color: #1e293b; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Layout da Planta Baixa (Responsivo) */
        .container-planta { 
            max-width: 1200px; 
            margin: 30px auto; 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; 
        }
        
        /* Estilo de cada Bloco Base */
        .bloco { display: flex; flex-direction: column; background-color: #fff; border: 2px solid #94a3b8; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* O NOME DO BLOCO NO MEIO DOS LADOS */
        .bloco-header { background-color: #334155; color: #fbbf24; padding: 8px; text-align: center; font-weight: bold; font-size: 16px; letter-spacing: 2px; }
        
        /* Áreas Clicáveis Independentes (Lado A e Lado B) */
        .divisoes-top { display: flex; width: 100%; height: 55px; cursor: pointer; transition: background-color 0.2s; }
        .lado-a { border-bottom: 2px solid #cbd5e0; }
        .lado-b { border-top: 2px solid #cbd5e0; }
        
        /* Efeito de Hover apenas no lado que o mouse está passando */
        .lado-a:hover .divisao-top-item, .lado-b:hover .divisao-top-item { background-color: #e0f2fe; color: #0284c7; }
        
        .divisao-top-item { flex: 1; border-right: 1px solid #e2e8f0; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; color: #64748b; background-color: #f8fafc; transition: all 0.2s; pointer-events: none; /* Deixa o clique fluir para o container pai */ }
        .divisao-top-item:last-child { border-right: none; }

        /* Janela Modal (Visão Frontal) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 10px; box-sizing: border-box; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 1000px; max-height: 95vh; display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.25); box-sizing: border-box; }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .modal-title { font-size: 20px; font-weight: bold; color: #1e293b; margin: 0; }
        .btn-fechar { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        .btn-fechar:hover { background: #dc2626; }

        /* Container com Scroll para celulares */
        .estante-scroll-wrapper { width: 100%; overflow-x: auto; overflow-y: auto; padding-bottom: 10px; padding-right: 10px; }
        
        /* Estrutura da Prateleira Frontal */
        .lado-titulo { background-color: #fbbf24; color: #1e293b; font-weight: bold; padding: 8px 15px; margin-bottom: 0; border-radius: 4px 4px 0 0; display: inline-block; font-size: 18px; }
        
        .estante { background-color: #cbd5e0; padding: 10px; border-radius: 0 8px 8px 8px; border: 4px solid #64748b; min-width: 750px; margin-bottom: 10px; }
        .nivel-row { display: flex; background-color: #f1f5f9; margin-bottom: 10px; border-bottom: 6px solid #94a3b8; }
        .nivel-row:last-child { margin-bottom: 0; }
        .nivel-label { background-color: #1e293b; color: white; width: 50px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; border-radius: 4px 0 0 4px; flex-shrink: 0; }
        
        /* Posição Final (Buraco do Estoque) */
        .posicao-slot { flex: 1; height: 70px; min-width: 120px; display: flex; justify-content: center; align-items: center; border-right: 2px dashed #cbd5e0; background-color: white; font-weight: bold; color: #334155; font-size: 13px; transition: background 0.2s; cursor: pointer; }
        .posicao-slot:last-child { border-right: none; }
        .posicao-slot:hover { background-color: #dcfce7; color: #16a34a; border-style: solid; }

        @media (max-width: 600px) {
            header { font-size: 18px; padding: 15px; }
            .container-planta { margin: 15px auto; padding: 10px; gap: 15px; }
            .modal-content { padding: 15px; }
            .modal-title { font-size: 16px; }
        }
    </style>
</head>
<body>

    <header>
        WMS - Planta do Depósito (Lados A e B Independentes)
    </header>

    <div class="container-planta" id="planta-container">
        </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-titulo">Bloco X - Lado X</h2>
                <button class="btn-fechar" onclick="fecharModal()">FECHAR</button>
            </div>
            
            <div class="estante-scroll-wrapper" id="estante-wrapper">
                </div>
        </div>
    </div>

    <script>
        const totalBlocos = 12;
        const totalDivisoes = 6;
        const totalNiveis = 5;

        // 1. GERAR A VISÃO SUPERIOR (12 Blocos)
        const plantaContainer = document.getElementById('planta-container');

        for (let b = 1; b <= totalBlocos; b++) {
            let blocoStr = b.toString().padStart(2, '0');
            
            let blocoDiv = document.createElement('div');
            blocoDiv.className = 'bloco';

            // --- LADO A (Topo do Bloco - AGORA É CLICÁVEL ISOLADAMENTE) ---
            let divisoesA = document.createElement('div');
            divisoesA.className = 'divisoes-top lado-a';
            divisoesA.title = `Clique para ver Lado A do Bloco ${blocoStr}`;
            divisoesA.onclick = () => abrirVisaoFrontal(blocoStr, 'A'); // Passa 'A' para a função

            for (let d = 1; d <= totalDivisoes; d++) {
                let divItem = document.createElement('div');
                divItem.className = 'divisao-top-item';
                divItem.innerText = `A${d}`;
                divisoesA.appendChild(divItem);
            }
            blocoDiv.appendChild(divisoesA);

            // --- NOME DO BLOCO (No Meio - Não clicável) ---
            let blocoHeader = document.createElement('div');
            blocoHeader.className = 'bloco-header';
            blocoHeader.innerText = `BLOCO ${blocoStr}`;
            blocoDiv.appendChild(blocoHeader);

            // --- LADO B (Fundo do Bloco - AGORA É CLICÁVEL ISOLADAMENTE) ---
            let divisoesB = document.createElement('div');
            divisoesB.className = 'divisoes-top lado-b';
            divisoesB.title = `Clique para ver Lado B do Bloco ${blocoStr}`;
            divisoesB.onclick = () => abrirVisaoFrontal(blocoStr, 'B'); // Passa 'B' para a função

            for (let d = 1; d <= totalDivisoes; d++) {
                let divItem = document.createElement('div');
                divItem.className = 'divisao-top-item';
                divItem.innerText = `B${d}`;
                divisoesB.appendChild(divItem);
            }
            blocoDiv.appendChild(divisoesB);

            // Adiciona o bloco pronto à tela
            plantaContainer.appendChild(blocoDiv);
        }

        // 2. GERAR A VISÃO FRONTAL (Modal construindo apenas o LADO CLICADO)
        function abrirVisaoFrontal(blocoId, ladoSelecionado) {
            // Atualiza o título do modal com o lado específico
            document.getElementById('modal-titulo').innerText = `BLOCO ${blocoId} - LADO ${ladoSelecionado}`;
            const wrapper = document.getElementById('estante-wrapper');
            wrapper.innerHTML = ''; // Limpa a renderização anterior

            // Título do Lado (Ex: LADO A)
            let tituloLado = document.createElement('div');
            tituloLado.className = 'lado-titulo';
            tituloLado.innerText = `LADO ${ladoSelecionado}`;
            wrapper.appendChild(tituloLado);

            // A Estante daquele lado
            let estanteContainer = document.createElement('div');
            estanteContainer.className = 'estante';

            // Níveis (De 5 até 1)
            for (let n = totalNiveis; n >= 1; n--) {
                let row = document.createElement('div');
                row.className = 'nivel-row';

                let nivelLabel = document.createElement('div');
                nivelLabel.className = 'nivel-label';
                nivelLabel.innerText = `N${n}`;
                row.appendChild(nivelLabel);

                // Divisões (De 1 a 6)
                for (let d = 1; d <= totalDivisoes; d++) {
                    let slot = document.createElement('div');
                    slot.className = 'posicao-slot';
                    
                    let dStr = d.toString().padStart(2, '0');
                    let nStr = n.toString().padStart(2, '0');
                    
                    // Novo Endereço final
                    let enderecoCompleto = `B${blocoId}-${ladoSelecionado}-D${dStr}-N${nStr}`;
                    
                    slot.innerText = enderecoCompleto;

                    slot.onclick = () => alert(`Você clicou no endereço: ${enderecoCompleto}\n(Lado: ${ladoSelecionado}, Divisão: ${dStr}, Nível: ${nStr})`);
                    
                    row.appendChild(slot);
                }
                estanteContainer.appendChild(row);
            }
            wrapper.appendChild(estanteContainer);

            // Mostra o Modal
            document.getElementById('modal').style.display = 'flex';
        }

        // 3. Função para fechar a Visão Frontal
        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onclick = function(event) {
            let modal = document.getElementById('modal');
            if (event.target == modal) {
                fecharModal();
            }
        }
    </script>
</body>
</html>
